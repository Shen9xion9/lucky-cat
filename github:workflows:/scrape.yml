name: Scrape Singapore Pools Results

on:
  schedule:
    # TOTO draws: Monday and Thursday at 6:30pm SGT (10:30 UTC)
    - cron: '35 10 * * 1'
    - cron: '35 10 * * 4'
    # 4D draws: Wednesday, Saturday, Sunday at 6:30pm SGT (10:30 UTC)
    - cron: '35 10 * * 3'
    - cron: '35 10 * * 6'
    - cron: '35 10 * * 0'
  workflow_dispatch:  # allows manual trigger from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
